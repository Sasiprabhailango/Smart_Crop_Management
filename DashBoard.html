<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashBoard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

    
   <nav>
        <div class="logo">
               🌾 Smart Crop Management
        </div>
        <div class="nav-links">
          <a href="index.html">
            <i class="fa-solid fa-house fa-lg"></i>
            Home
        </a>
          <a href="Crop_care_Assistant.html">
            <i class="fa-solid fa-seedling  fa-lg"></i>
            Crop Care
        </a>
          <a href="Crop_Price_Tracker.html">
            <i class="fa-solid fa-sack-dollar  fa-lg"></i>
            Price Tracker
        </a>
          <a href="DashBoard.html"><i class="fa-solid fa-chart-line fa-lg"></i>
            DashBoard
        </a>
        </div>
    </nav>

    <div class="crop-container">
        <h1>
          <i class="fa-solid fa-chart-line fa-lg"></i>
          Dashboard
         </h1>
        
         <p class="dashboard-subtitle">
          Track crop statistics and prices in one place.
         </p>
        <div class="dashboard-cards">
              <div class="card green-card">
                <h3>
                  <i class="fa-solid fa-seedling"></i>
                  Total Crops
                </h3>
                <p id="totalCrops">0</p>
              </div>

              <div class="card blue-card">
                <h3>
                  <i class="fa-solid fa-sack-dollar"></i>
                  Price Entries
                </h3>
                <p id="priceEntries">0</p>
              </div>

              <div class="card orange-card">
                <h3>
                  <i class="fa-solid fa-arrow-trend-up"></i>
                  Highest Price
                </h3>
                <p id="highestPrice">0</p>
              </div>

              <div class="card purple-card">
                <h3>
                  <i class="fa-solid fa-chart-column"></i>
                  Average Price
                </h3>
                <p id="averagePrice">0</p>
              </div>
        </div>    

        <div class="recent-updates">
          <h2>
             <i class="fa-solid fa-clock-rotate-left"></i>
             Recent Price Updates
          </h2>

          <table>
            <thead>
              <tr>
                <th>Crop Name</th>
                <th>Price</th>
              </tr>
            </thead>
            <tbody id="recentList">

            </tbody>
          </table>
        

        </div>
   </div> 
   <script src="dashboard.js"></script>
</body>
</html>
