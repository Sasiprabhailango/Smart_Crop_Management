<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Price Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
       
    
    <nav>
        <div class="logo">
               🌾 Smart Crop Management
        </div>
        <div class="nav-links">
          <a href="index.html">
            <i class="fa-solid fa-house fa-lg"></i>
            Home
        </a>
          <a href="Crop_care_Assistant.html">
            <i class="fa-solid fa-seedling  fa-lg"></i>
            Crop Care
        </a>
          <a href="Crop_Price_Tracker.html">
            <i class="fa-solid fa-sack-dollar  fa-lg"></i>
            Price Tracker
        </a>
          <a href="DashBoard.html"><i class="fa-solid fa-chart-line fa-lg"></i>
            Dashboard
        </a>
        </div>
    </nav>

    
     <div class="crop-container">

         <h1>
            <i class="fa-solid fa-sack-dollar  fa-lg"></i>
            Crop Price Tracker
        </h1>
         <div class="price-form" id="priceForm">
            <label for="cropName">Crop Name</label>
            <input  type="text" id="cropName" placeholder="Enter the crop name">
            
            <label for="cropPrice">Crop Price</label>
            <input type="number" id="cropPrice" placeholder="Enter the Crop Price">
           
            <button id="btn" class="add-button">
                 <i class="fa-solid fa-plus"></i>
                 Add Price
            </button>
       </div>
       <h2>Saved Crop Prices</h2>
     <div id="priceList"></div>

</div>

    <script src="script.js"></script>
</body>
