<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Price Tracker</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/price.css">
     <link rel="icon" type="image/x-icon" href="images/price.ico">
    <!-- <link rel="stylesheet" href="style.css"> -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="price-page">
       
    
    <nav>
        <div class="logo">
               🌾 Smart Crop Management
        </div>
        <div class="nav-links">
          <a href="index.html">
            <i class="fa-solid fa-house fa-lg"></i>
            Home
        </a>
          <a href="Crop_care_Assistant.html">
            <i class="fa-solid fa-seedling  fa-lg"></i>
            Crop Care
        </a>
          <a href="Crop_Price_Tracker.html">
            <i class="fa-solid fa-sack-dollar  fa-lg"></i>
            Price Tracker
        </a>
          <a href="DashBoard.html"><i class="fa-solid fa-chart-line fa-lg"></i>
            Dashboard
        </a>
        </div>
    </nav>

    
     <div class="crop-container">

         <h1>
            <i class="fa-solid fa-sack-dollar  fa-lg"></i>
            Crop Price Tracker
        </h1>
        <div class="tracker-layout">
            <div class="left-panel">
               <div class="price-form" id="priceForm">
                    <label for="cropName">Crop Name</label>
                    <input  type="text" id="cropName" placeholder="Enter the crop name">
            
                    <label for="cropPrice">Crop Price</label>
                    <input type="number" id="cropPrice" placeholder="Enter the Crop Price">
           
                    <button id="btn" class="add-button">
                        <i class="fa-solid fa-plus"></i>
                        Add Price
                    </button>

                   <button type="button" id="cancelBtn" style="display:none;">
                       <i class="fa-solid fa-xmark"></i>
                       Cancel
                   </button>
                </div>
            </div>
            <div class="center-panel">
                <div class="top-actions">
                    
                          <div class="search-box">
                               <input type="text" id="searchCrop" placeholder="🔍 Search Crop..">
                          </div>
                          <div class="sort-container">
                              <label for="sortCrop"> Sort By:</label>
                             <select id="sortCrop">
                                <option value="Default">Default</option>
                                <option value="low-high">Price : Low -> High</option>
                                <option value="high-low">Price : High -> Low</option>
                                <option value="az">Name : A -> Z</option>
                                <option value="za">Name : Z -> A</option>
                              </select>
                          </div>
                    </div>
                    <h2>Current Prices</h2>
                   <div id="priceList">
                   </div>
            </div>
       <div class="recent-updates">

           <h2>Recent Updates</h2>

       </div>
    </div>
       

</div>

    <script src="js/price.js"></script>

    <footer class="footer">
    <div class="footer-bottom">
        © 2026 Smart Crop Management | All Rights Reserved.
    </div>
</footer>
</body>
</html>
