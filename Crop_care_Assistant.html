<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Care Assistant</title>
   
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/crop.css">
    <link rel="icon" type="image/x-icon" href="images/crop.ico">
 <!-- <link rel="stylesheet" href="style.css"> -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="crop-page">

    
    <nav>
        <div class="logo">
               🌾 Smart Crop Management
        </div>
        <div class="nav-links">
          <a href="index.html">
            <i class="fa-solid fa-house fa-lg"></i>
            Home
        </a>
          <a href="Crop_care_Assistant.html">
            <i class="fa-solid fa-seedling  fa-lg"></i>
            Crop Care
        </a>
          <a href="Crop_Price_Tracker.html">
            <i class="fa-solid fa-sack-dollar  fa-lg"></i>
            Price Tracker
        </a>
          <a href="DashBoard.html"><i class="fa-solid fa-chart-line fa-lg"></i>
            DashBoard
        </a>
        </div>
    </nav>

    
    <div class="crop-container">
    <h1><i class="fa-solid fa-seedling  fa-lg"></i>Crop Care Assistant</h1>
    <select id="cropSelect">
        <option value="">Select Crop</option>
        <option value="Rice">Rice</option>
        <option value="Wheat">Wheat</option>
        <option value="Corn">Corn</option>
        <option value="Cotton">Cotton</option>
        <option value="Sugarcane">Sugarcane</option>
        <option value="Peanut">Peanut</option>
        <option value="Soybean">Soybean</option>
        <option value="Tomato">Tomato</option>
        <option value="Potato">Potato</option>
        <option value="Onion">Onion</option>
        <option value="Banana">Banana</option>
        <option value="Mango">Mango</option>
        <option value="Coconut">Coconut </option>
        <option value="Cabbage">Cabbage</option>
        <option value="Brinjal">Brinjal</option>
        <option value="Cauliflower">Cauliflower</option>
    </select>
    <div id="result">
        <img  id="cropImage"  alt="Crop Image">
      
        <div class="info-grid">

           <div class="info-card">
               <i class="fa-solid fa-droplet"></i>
                Water
              <p id="water"></p>
           </div>

           <div class="info-card">
             <i class="fa-solid fa-seedling"></i>
             Fertilizer
            <p id="fertilizer"></p>
           </div>

           <div class="info-card">
             <i class="fa-solid fa-mountain"></i>
              Soil
             <p id="soil"></p>
           </div>

           <div class="info-card">
           <i class="fa-solid fa-virus"></i>
             Disease
            <p id="disease"></p>
          </div>

          <div class="info-card harvest-card">
          
            <img src="images/sickle.jpeg" class="harvest-icon" alt="harvest">
             <h3> Harvest Time</h3>
            
            <p id="harvesting"></p>
          </div>

    </div>

    </div>
</div>
    
    <script src="js/crop.js"></script>


    <footer class="footer">
    <div class="footer-bottom">
        © 2026 Smart Crop Management | All Rights Reserved.
    </div>
</footer>
    
</body>
</html>
